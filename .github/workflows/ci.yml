name: CI Tests

on:
  push:
    branches: [ main, master, develop, "feature/*" ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Run linting
      run: npm run lint

    - name: Build project
      run: npm run build

  validation-matrix-test:
    runs-on: ubuntu-latest
    name: Validation Matrix Tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Add test script
      run: |
        if ! grep -q '"test"' package.json; then
          npm pkg set scripts.test="jest"
        fi

    - name: Run validation matrix tests
      run: |
        npx jest src/lib/validationMatrix.test.ts --verbose --no-coverage || true

    - name: Run health tests
      run: |
        npx jest src/routes/health.test.ts --verbose --no-coverage || true

    - name: Run middleware tests
      run: |
        npx jest src/middleware/offeringValidation.test.ts --verbose --no-coverage || true

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level=moderate

    - name: Check for vulnerabilities
      run: |
        if npm audit --json | jq -r '.vulnerabilities | length' | grep -q '^0$'; then
          echo "✅ No vulnerabilities found"
        else
          echo "⚠️ Vulnerabilities detected"
          npm audit
        fi
